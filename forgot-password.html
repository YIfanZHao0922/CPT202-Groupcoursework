<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Project Selection System</title>
    <!-- Path fix: from common/html/ to common/css/, use ../css/ -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/forgot-password.css">
</head>
<body>
    <header class="header">
        <div class="header-logo" id="logoHome">Project Selection System</div>
    </header>

    <main class="main-content">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Forgot Password</h1>
                    <p>Enter your email to reset your password</p>
                </div>

                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
                    <div id="forgotMessage" class="message-area"></div>
                </form>

                <div class="auth-footer">
                    <p>Remember your password? <a href="login.html">Back to Login</a></p>
                    <p><a href="./index.html">Back to Home</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        $(document).ready(function() {
            $('#logoHome').on('click', function() {
                window.location.href = "index.html";
            });

            $('#forgotPasswordForm').on('submit', function(e) {
                e.preventDefault();
                const email = $('#resetEmail').val().trim();
                if (!email) {
                    $('#forgotMessage').text('Please enter your email').removeClass('success').addClass('error');
                    return;
                }
                $('#forgotMessage').text('Reset link sent! Please check your email').removeClass('error').addClass('success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            });
        });
    </script>
</body>
</html>
